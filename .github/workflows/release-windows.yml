name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.2.0)"
        required: true
        default: "v0.2.0"
  push:
    tags:
      - "v*"
    branches:
      - "release/v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows EXE and installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#release/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Public safety check
        shell: powershell
        run: python .\scripts\prepublish_check.py

      - name: Build portable EXE
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build-exe.ps1

      - name: Package portable ZIP
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path release\portable | Out-Null
          Copy-Item "dist\Talk Dat!.exe" "release\portable\Talk Dat!.exe"
          Copy-Item "docs\START_HERE_WINDOWS.md" "release\portable\START-HERE.md"
          Copy-Item "docs\INSTALL.md" "release\portable\INSTALL.md"
          Copy-Item "docs\PROVIDERS.md" "release\portable\PROVIDERS.md"
          Compress-Archive -Path "release\portable\*" -DestinationPath "release\Talk-Dat-Windows-Portable.zip" -Force

      - name: Build custom glass installer
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build-custom-installer.ps1 -SkipExeBuild

      - name: Create checksums
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $files = @(
            "release\Talk-Dat-Windows-Portable.zip",
            "release\Talk-Dat-Setup.exe"
          )
          $lines = foreach ($file in $files) {
            if (Test-Path $file) {
              $hash = Get-FileHash $file -Algorithm SHA256
              "$($hash.Hash.ToLower())  $(Split-Path -Leaf $file)"
            }
          }
          $lines | Set-Content -Path "release\SHA256SUMS.txt" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: talk-dat-windows-release
          path: |
            release/Talk-Dat-Windows-Portable.zip
            release/Talk-Dat-Setup.exe
            release/SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'release/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: |
            release/Talk-Dat-Windows-Portable.zip
            release/Talk-Dat-Setup.exe
            release/SHA256SUMS.txt
          body: |
            ## Download

            - `Talk-Dat-Setup.exe` is the recommended custom glass Windows installer.
            - `Talk-Dat-Windows-Portable.zip` is the no-installer portable build.

            ## First Run

            Launch the app, choose a speech provider, paste your own API key, and save setup. The microphone stays off until you press a trigger or click the pill.

            ## Privacy

            This release does not contain API keys, private config, dictionaries, snippets, or transcript history. User data is stored locally under `%APPDATA%\TalkDat`.
